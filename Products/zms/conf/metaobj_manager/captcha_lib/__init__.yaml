captcha_lib:
  enabled: 0
  lang_dict:
    captcha_lib.captcha_hint:
      ger: Bitte geben Sie nun abschliessend folgende vier-stellige Prüfziffer 
        zum Schutz vor Spam in das weisse Feld ein; beachten Sie, dass sich die 
        Prüfziffer alle zwei Minuten erneuert. Durch Klick auf das blaue 
        Stoppuhr-Symbol "Reload" können Sie jederzeit eine erneut zwei Minuten 
        gütige Prüfziffer anfordern.
    captcha_lib.captcha_input:
      ger: Bitte Prüfziffer eingeben und absenden.
    captcha_lib.captcha_invalid:
      ger: Leider ist die Eingabe der Prüfziffer nicht korrekt; bitte betätigen 
        Sie die "Zurück"-Taste des Webbrowsers und versuchen Sie es bitte 
        nochmals.
    captcha_lib.captcha_reload:
      ger: Erneuern
    captcha_lib.captcha_valid:
      ger: Prüfziffer korrekt.
