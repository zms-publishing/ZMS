            "label": "URL",
            "default_value": "https://localhost:9200",
            "is_target_of": ""
          },
          {
            "id": "elasticsearch.url.timeout",
            "type": "number",
            "label": "URL-Timeout",
            "default_value": "5",
            "is_target_of": ""
          },
          {
            "id": "elasticsearch.username",
            "type": "string",
            "label": "Username",
            "default_value": "admin",
            "is_target_of": ""
          },
          {
            "id": "elasticsearch.password",
            "type": "password",
            "label": "Password",
            "default_value": "admin",
            "is_target_of": ""
          },
          {
            "id": "elasticsearch.index_name",
            "type": "string",
            "label": "Index Name",
            "default_value": "",
            "is_target_of": ""
          },
          {
            "id": "elasticsearch.schema",
            "type": "text",
            "label": "Schema",
            "default_value": "{}",
            "is_target_of": "schematize"
          },
          {
            "id": "elasticsearch.suggest.fields",
            "type": "string",
            "label": "Suggest-Fields",
            "default_value": "['title','titlealt','attr_dc_description']",
            "is_target_of": ""
          },
          {
            "id": "elasticsearch.parser",
            "type": "string",
            "label": "Parser",
            "default_value": "http://localhost:9998/tika",
            "is_target_of": ""
          }
        ]
